<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Better Problems</title>
  <meta name="description" content="Surfacing stories of AI genuinely helping humanity — cutting through the hype and the doom to find what's actually working." />

  <meta property="og:title"       content="Better Problems" />
  <meta property="og:description" content="Surfacing stories of AI genuinely helping humanity — cutting through the hype and the doom to find what's actually working." />
  <meta property="og:type"        content="website" />

  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%232A5F3E'/><text x='50%25' y='57%25' dominant-baseline='middle' text-anchor='middle' font-family='Georgia,serif' font-size='20' fill='%23F5F3EE'>B</text></svg>" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Inter:wght@400;500&display=swap" rel="stylesheet" />

  <style>
    /* ======================================================================
       DESIGN TOKENS
    ====================================================================== */
    :root {
      /* Spacing — 8pt grid */
      --sp-1:  0.5rem;
      --sp-2:  1rem;
      --sp-3:  1.5rem;
      --sp-4:  2rem;
      --sp-6:  3rem;
      --sp-8:  4rem;
      --sp-12: 6rem;

      /* Palette */
      --bg:             #F5F3EE;
      --border:         #D8D4CB;
      --border-strong:  #1A1916;

      /* Text */
      --text-primary:   #1A1916;
      --text-secondary: #64615C;
      --text-tertiary:  #9C9891;

      /* Accent — botanical green, used once: the Featured eyebrow */
      --accent: #2A5F3E;

      /* Typography */
      --font-ui:        'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      --font-editorial: 'DM Serif Display', Georgia, serif;

      /* Layout */
      --col-width: 960px;
    }

    /* ======================================================================
       RESET & BASE
    ====================================================================== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { font-size: 16px; }

    body {
      font-family: var(--font-ui);
      font-size: 1rem;
      line-height: 1.6;
      background: var(--bg);
      color: var(--text-primary);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    /* ======================================================================
       COLUMN WRAPPER
    ====================================================================== */
    .col {
      width: 100%;
      max-width: var(--col-width);
      margin-inline: auto;
      padding-inline: var(--sp-4);
    }

    /* ======================================================================
       MASTHEAD
    ====================================================================== */
    .masthead {
      padding-top: var(--sp-8);
      padding-bottom: var(--sp-4);
      text-align: center;
      border-bottom: 1px solid var(--border-strong);
    }

    .masthead-name {
      font-family: var(--font-editorial);
      font-size: clamp(2.5rem, 6vw, 4.5rem);
      font-weight: 400;
      letter-spacing: -0.025em;
      line-height: 1;
      color: var(--text-primary);
      margin-bottom: var(--sp-2);
    }

    .masthead-tagline {
      font-size: 0.9375rem;
      font-style: italic;
      color: var(--text-secondary);
      max-width: 50ch;
      margin-inline: auto;
      line-height: 1.5;
    }

    /* ======================================================================
       MAIN
    ====================================================================== */
    main {
      flex: 1;
      padding-top: var(--sp-8);
      padding-bottom: var(--sp-12);
    }

    /* ======================================================================
       FEATURED STORY
    ====================================================================== */
    .featured-wrap {
      display: grid;
      grid-template-columns: 55fr 45fr;
      gap: var(--sp-8);
      margin-bottom: var(--sp-8);
    }

    .featured-eyebrow {
      font-size: 0.6875rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: var(--sp-2);
    }

    .featured-headline {
      font-family: var(--font-editorial);
      font-size: clamp(1.75rem, 3.5vw, 2.625rem);
      font-weight: 400;
      line-height: 1.2;
      letter-spacing: -0.01em;
      margin-bottom: var(--sp-2);
    }

    .featured-headline a {
      color: var(--text-primary);
      text-decoration: none;
      transition: color 0.1s;
    }

    .featured-headline a:hover { color: var(--accent); }

    .featured-right {
      padding-top: 0.2rem; /* optical alignment with eyebrow baseline */
    }

    .featured-summary {
      font-size: 1rem;
      color: var(--text-secondary);
      line-height: 1.65;
      margin-bottom: var(--sp-3);
    }

    .featured-note {
      font-size: 0.9375rem;
      font-style: italic;
      color: var(--text-secondary);
      line-height: 1.6;
    }

    /* ======================================================================
       METADATA — date only, left-aligned
    ====================================================================== */
    .card-date {
      font-size: 0.8125rem;
      color: var(--text-tertiary);
      margin-bottom: var(--sp-3);
    }

    /* ======================================================================
       GRID SEPARATOR
    ====================================================================== */
    .grid-separator {
      border: none;
      border-top: 1px solid var(--border);
      margin-bottom: var(--sp-6);
    }

    /* ======================================================================
       STORY GRID & CARDS
    ====================================================================== */
    .story-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: var(--sp-6);
    }

    .card {
      border-top: 1px solid var(--border);
      padding-top: var(--sp-3);
    }

    .card-headline {
      font-family: var(--font-editorial);
      font-size: 1.125rem;
      font-weight: 400;
      line-height: 1.35;
      margin-bottom: var(--sp-1);
    }

    .card-headline a {
      color: var(--text-primary);
      text-decoration: none;
      transition: color 0.1s;
    }

    .card-headline a:hover { color: var(--accent); }

    .card-note {
      font-size: 0.875rem;
      font-style: italic;
      color: var(--text-secondary);
      line-height: 1.55;
      margin-top: var(--sp-2);
    }

    /* ======================================================================
       EMPTY STATE
    ====================================================================== */
    .empty-state {
      grid-column: 1 / -1;
      padding: var(--sp-12) 0;
    }

    .empty-state p {
      font-size: 1rem;
      font-style: italic;
      color: var(--text-secondary);
      max-width: 44ch;
      line-height: 1.6;
    }

    /* ======================================================================
       SKELETON LOADER
    ====================================================================== */
    @keyframes shimmer {
      0%   { background-position: -600px 0; }
      100% { background-position:  600px 0; }
    }

    .skel-line {
      border-radius: 3px;
      background: linear-gradient(
        90deg,
        var(--bg)     25%,
        var(--border) 50%,
        var(--bg)     75%
      );
      background-size: 1200px 100%;
      animation: shimmer 1.5s ease-in-out infinite;
    }

    .skel-line + .skel-line { margin-top: 10px; }

    .skel-line.h-40  { height: 40px; }
    .skel-line.h-20  { height: 20px; }
    .skel-line.h-14  { height: 14px; }
    .skel-line.h-12  { height: 12px; }
    .skel-line.w-100 { width: 100%; }
    .skel-line.w-80  { width: 80%; }
    .skel-line.w-60  { width: 60%; }
    .skel-line.w-40  { width: 40%; }

    .skel-spacer-sm { height: var(--sp-2); }
    .skel-spacer    { height: var(--sp-3); }
    .skel-spacer-lg { height: var(--sp-8); }

    .skel-featured  { margin-bottom: var(--sp-8); }

    .skel-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: var(--sp-6);
    }

    .skel-card {
      border-top: 1px solid var(--border);
      padding-top: var(--sp-3);
    }

    /* ======================================================================
       LOAD ERROR
    ====================================================================== */
    .load-error {
      padding-top: var(--sp-12);
      font-size: 1rem;
      font-style: italic;
      color: var(--text-tertiary);
    }

    /* ======================================================================
       FILTER BAR
    ====================================================================== */
    .filter-bar {
      display: flex;
      flex-wrap: wrap;
      gap: var(--sp-1);
      margin-bottom: var(--sp-6);
    }

    .tag-btn {
      font-family: var(--font-ui);
      font-size: 0.75rem;
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--text-secondary);
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 2rem;
      padding: 0.25rem 0.75rem;
      cursor: pointer;
      transition: color 0.1s, border-color 0.1s, background 0.1s;
    }

    .tag-btn:hover {
      color: var(--text-primary);
      border-color: var(--text-primary);
    }

    .tag-btn.active {
      color: var(--bg);
      background: var(--text-primary);
      border-color: var(--text-primary);
    }

    /* ======================================================================
       FOOTER
    ====================================================================== */
    footer {
      border-top: 1px solid var(--border);
      padding: var(--sp-3) 0;
    }

    .footer-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 0.75rem;
      color: var(--text-tertiary);
    }

    .footer-inner a {
      color: var(--text-tertiary);
      text-decoration: none;
    }

    .footer-inner a:hover { color: var(--text-secondary); }

    /* ======================================================================
       ACCESSIBILITY
    ====================================================================== */
    :focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 3px;
      border-radius: 3px;
    }

    /* ======================================================================
       RESPONSIVE
    ====================================================================== */
    @media (max-width: 640px) {
      .featured-wrap { grid-template-columns: 1fr; gap: var(--sp-4); }
      .story-grid    { grid-template-columns: 1fr; }
      .skel-grid     { grid-template-columns: 1fr; }
    }

    @media (max-width: 480px) {
      :root { --sp-4: 1.25rem; --sp-8: 3rem; }
      .masthead-name { letter-spacing: -0.015em; }
    }
  </style>
</head>
<body>

<!-- ── Masthead ─────────────────────────────────────────────────────────── -->
<header>
  <div class="col">
    <div class="masthead">
      <h1 class="masthead-name">Better Problems</h1>
      <p class="masthead-tagline">Surfacing stories of AI genuinely helping humanity — cutting through the hype and the doom to find what's actually working.</p>
    </div>
  </div>
</header>

<!-- ── Content ─────────────────────────────────────────────────────────── -->
<main>
  <div class="col">
    <!-- Filter bar placeholder (kept for future use, not rendered) -->
    <div id="filter-bar"></div>

    <!-- Story content: re-rendered on filter change -->
    <div id="story-content" aria-live="polite"></div>

  </div>
</main>

<!-- ── Footer ──────────────────────────────────────────────────────────── -->
<footer>
  <div class="col footer-inner">
    <span id="last-updated"></span>
    <a href="https://github.com/mrjohnsonloomis/ai_news" target="_blank" rel="noopener noreferrer">Source</a>
  </div>
</footer>

<script>
  // ────────────────────────────────────────────────────────────────────────
  // State
  // ────────────────────────────────────────────────────────────────────────

  let currentFilter = 'all';
  let allStories    = [];

  // ────────────────────────────────────────────────────────────────────────
  // Utilities
  // ────────────────────────────────────────────────────────────────────────

  function esc(str) {
    return String(str ?? '')
      .replace(/&/g,  '&amp;')
      .replace(/</g,  '&lt;')
      .replace(/>/g,  '&gt;')
      .replace(/"/g,  '&quot;');
  }

  // Avoids timezone day-shift by parsing as local date
  function localDate(dateStr) {
    const [y, m, d] = (dateStr ?? '').split('-').map(Number);
    return (y && m && d) ? new Date(y, m - 1, d) : null;
  }

  function formatDateShort(dateStr) {
    const dt = localDate(dateStr);
    return dt ? dt.toLocaleDateString('en-US', {
      month: 'long', day: 'numeric', year: 'numeric',
    }) : (dateStr ?? '');
  }

  function formatTimestamp(iso) {
    return iso ? new Date(iso).toLocaleString('en-US', {
      month: 'short', day: 'numeric', year: 'numeric',
      hour: '2-digit', minute: '2-digit', timeZoneName: 'short',
    }) : '';
  }

  function normalizeTag(tag) {
    return (tag || 'Other').trim();
  }

  function filteredStories() {
    if (currentFilter === 'all') return allStories;
    return allStories.filter(s => normalizeTag(s.tag) === currentFilter);
  }

  // ────────────────────────────────────────────────────────────────────────
  // Skeleton
  // ────────────────────────────────────────────────────────────────────────

  function skeletonHtml() {
    return `
      <div class="skel-featured featured-wrap" aria-hidden="true">
        <div class="featured-left">
          <div class="skel-line h-12 w-40"></div>
          <div class="skel-spacer-sm"></div>
          <div class="skel-line h-40 w-100"></div>
          <div class="skel-line h-40 w-80"></div>
          <div class="skel-spacer-sm"></div>
          <div class="skel-line h-12 w-40"></div>
        </div>
        <div class="featured-right">
          <div class="skel-line h-14 w-100"></div>
          <div class="skel-line h-14 w-100"></div>
          <div class="skel-line h-14 w-80"></div>
          <div class="skel-spacer"></div>
          <div class="skel-line h-14 w-100"></div>
          <div class="skel-line h-14 w-60"></div>
        </div>
      </div>
      <hr class="grid-separator" aria-hidden="true" />
      <div class="skel-grid" aria-hidden="true">
        ${[1, 2].map(() => `
          <div class="skel-card">
            <div class="skel-line h-20 w-100"></div>
            <div class="skel-line h-20 w-80"></div>
            <div class="skel-spacer-sm"></div>
            <div class="skel-line h-12 w-40"></div>
            <div class="skel-spacer-sm"></div>
            <div class="skel-line h-14 w-100"></div>
            <div class="skel-line h-14 w-80"></div>
          </div>`).join('')}
      </div>`;
  }

  // ────────────────────────────────────────────────────────────────────────
  // Rendering
  // ────────────────────────────────────────────────────────────────────────

  function metaHtml(story) {
    const source = story.source ? `${esc(story.source)} · ` : '';
    return `<p class="card-date">${source}${esc(formatDateShort(story.date))}</p>`;
  }

  function featuredHtml(story) {
    return `
      <div class="featured-wrap">
        <div class="featured-left">
          <p class="featured-eyebrow">Featured</p>
          <h2 class="featured-headline">
            <a href="${esc(story.url)}" target="_blank" rel="noopener noreferrer">
              ${esc(story.headline)}
            </a>
          </h2>
          ${metaHtml(story)}
        </div>
        <div class="featured-right">
          ${story.summary
            ? `<p class="featured-summary">${esc(story.summary)}</p>`
            : ''}
          ${story.reason
            ? `<p class="featured-note">${esc(story.reason)}</p>`
            : ''}
        </div>
      </div>`;
  }

  function gridCardHtml(story) {
    return `
      <article class="card">
        <h3 class="card-headline">
          <a href="${esc(story.url)}" target="_blank" rel="noopener noreferrer">
            ${esc(story.headline)}
          </a>
        </h3>
        ${metaHtml(story)}
        ${story.reason
          ? `<p class="card-note">${esc(story.reason)}</p>`
          : ''}
      </article>`;
  }

  function gridHtml(stories) {
    if (stories.length === 0) return '';
    return `
      <hr class="grid-separator" />
      <div class="story-grid">
        ${stories.map(s => gridCardHtml(s)).join('\n')}
      </div>`;
  }

  function emptyStateHtml() {
    const msg = currentFilter === 'all'
      ? 'Nothing passed the bar today — the filter is strict by design. Check back tomorrow.'
      : `No ${currentFilter} stories in the feed yet.`;
    return `
      <div class="story-grid">
        <div class="empty-state">
          <p>${esc(msg)}</p>
        </div>
      </div>`;
  }

  function storyContentHtml() {
    const stories = filteredStories();
    if (stories.length === 0) return emptyStateHtml();
    const [featured, ...rest] = stories;
    return featuredHtml(featured) + gridHtml(rest);
  }

  function filterBarHtml(stories) {
    const tags = [...new Set(stories.map(s => normalizeTag(s.tag)))].sort();
    if (tags.length === 0) return '';
    const buttons = ['all', ...tags].map(tag => {
      const label = tag === 'all' ? 'All' : tag;
      const active = currentFilter === tag ? ' active' : '';
      return `<button class="tag-btn${active}" data-tag="${esc(tag)}">${esc(label)}</button>`;
    }).join('');
    return `<div class="filter-bar">${buttons}</div>`;
  }

  // ────────────────────────────────────────────────────────────────────────
  // Filter interaction (logic preserved, UI suppressed)
  // ────────────────────────────────────────────────────────────────────────

  function applyFilter(tag) {
    currentFilter = tag;
    document.querySelectorAll('.tag-btn').forEach(btn => {
      btn.classList.toggle('active', btn.dataset.tag === tag);
    });
    document.getElementById('story-content').innerHTML = storyContentHtml();
  }

  // ────────────────────────────────────────────────────────────────────────
  // Init
  // ────────────────────────────────────────────────────────────────────────

  async function init() {
    const filterBarEl = document.getElementById('filter-bar');
    const contentEl   = document.getElementById('story-content');
    const tsEl        = document.getElementById('last-updated');

    // Show skeleton immediately
    contentEl.innerHTML = skeletonHtml();

    try {
      const resp = await fetch('data/stories.json');
      if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
      const data = await resp.json();

      allStories = data.stories ?? [];

      // Render filter bar (currently returns empty string)
      const barHtml = filterBarHtml(allStories);
      if (barHtml) {
        filterBarEl.innerHTML = barHtml;
        filterBarEl.addEventListener('click', e => {
          const btn = e.target.closest('.tag-btn');
          if (btn) applyFilter(btn.dataset.tag);
        });
      }

      // Render stories
      contentEl.innerHTML = storyContentHtml();

      // Footer timestamp
      if (data.last_updated) {
        tsEl.textContent = 'Updated ' + formatTimestamp(data.last_updated);
      }

    } catch (err) {
      contentEl.innerHTML = `
        <p class="load-error">Unable to load feed — ${esc(err.message)}</p>`;
    }
  }

  init();
</script>
</body>
</html>
