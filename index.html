<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Better Problems</title>
  <meta name="description" content="Surfacing stories of AI genuinely helping humanity — cutting through the hype and the doom to find what's actually working." />

  <meta property="og:title"       content="Better Problems" />
  <meta property="og:description" content="Surfacing stories of AI genuinely helping humanity — cutting through the hype and the doom to find what's actually working." />
  <meta property="og:type"        content="website" />

  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%232A5F3E'/><text x='50%25' y='57%25' dominant-baseline='middle' text-anchor='middle' font-family='Georgia,serif' font-size='20' fill='%23F5F3EE'>B</text></svg>" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Inter:wght@400;500&display=swap" rel="stylesheet" />

  <style>
    /* ======================================================================
       DESIGN TOKENS
       8pt spacing grid. Warm paper palette. Botanical green accent.
       DM Serif Display for editorial headlines. Inter for all UI.
    ====================================================================== */
    :root {
      /* Spacing — strict 8pt grid */
      --sp-1:  0.5rem;   /*  8px */
      --sp-2:  1rem;     /* 16px */
      --sp-3:  1.5rem;   /* 24px */
      --sp-4:  2rem;     /* 32px */
      --sp-6:  3rem;     /* 48px */
      --sp-8:  4rem;     /* 64px */
      --sp-12: 6rem;     /* 96px */

      /* Surfaces */
      --bg:           #F5F3EE;
      --surface:      #FFFFFF;
      --border:       #E2DFD8;
      --border-focus: #C4C0B7;

      /* Text */
      --text-primary:   #1A1916;
      --text-secondary: #64615C;
      --text-tertiary:  #9C9891;

      /* Accent — botanical green */
      --accent:        #2A5F3E;
      --accent-text:   #1E4530;
      --accent-bg:     #EAF2ED;
      --accent-border: rgba(42, 95, 62, 0.2);

      /* Tags */
      --tag-bg:          #ECEAE4;
      --tag-text:        #58554F;
      --tag-active-bg:   #2A5F3E;
      --tag-active-text: #FFFFFF;

      /* Typography */
      --font-ui:        'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      --font-editorial: 'DM Serif Display', Georgia, serif;

      /* Shape — one radius, used everywhere */
      --radius:    5px;
      --radius-sm: 3px;

      /* Layout */
      --col-width: 1100px;
    }

    /* ======================================================================
       RESET & BASE
    ====================================================================== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { font-size: 16px; }

    body {
      font-family: var(--font-ui);
      font-size: 1rem;
      line-height: 1.6;
      background-color: var(--bg);
      color: var(--text-primary);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    /* ======================================================================
       COLUMN WRAPPER — one pattern, used everywhere
    ====================================================================== */
    .col {
      width: 100%;
      max-width: var(--col-width);
      margin-inline: auto;
      padding-inline: var(--sp-4);
    }

    /* ======================================================================
       MASTHEAD
    ====================================================================== */
    .masthead {
      padding-top: var(--sp-6);
      border-bottom: 2px solid var(--text-primary);
    }

    .masthead-body {
      text-align: center;
      padding-bottom: var(--sp-3);
    }

    .masthead-rule {
      border: none;
      border-top: 1px solid var(--text-primary);
      margin-bottom: var(--sp-3);
    }

    .masthead-name {
      font-family: var(--font-editorial);
      font-size: clamp(2.25rem, 5vw, 3.75rem);
      font-weight: 400;
      letter-spacing: -0.02em;
      line-height: 1.05;
      color: var(--text-primary);
      margin-bottom: var(--sp-2);
    }

    .masthead-tagline {
      font-size: 0.9375rem;
      font-style: italic;
      color: var(--text-secondary);
      max-width: 52ch;
      margin-inline: auto;
      line-height: 1.5;
    }

    /* Three-column strip below the editorial text: date · edition · source */
    .masthead-strip {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      padding: var(--sp-1) 0;
      margin-top: var(--sp-3);
      border-top: 1px solid var(--border);
      font-size: 0.6875rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--text-tertiary);
    }

    .masthead-strip-center { text-align: center; }

    .masthead-strip-right {
      text-align: right;
    }

    .masthead-strip a {
      color: var(--text-tertiary);
      text-decoration: none;
      transition: color 0.1s;
    }

    .masthead-strip a:hover { color: var(--text-secondary); }

    /* ======================================================================
       MAIN
    ====================================================================== */
    main {
      flex: 1;
      padding-top: var(--sp-6);
      padding-bottom: var(--sp-12);
    }

    /* ======================================================================
       TAG FILTER BAR
    ====================================================================== */
    .filter-bar {
      display: flex;
      align-items: center;
      gap: var(--sp-1);
      flex-wrap: wrap;
      padding-bottom: var(--sp-4);
      border-bottom: 1px solid var(--border);
      margin-bottom: var(--sp-6);
    }

    .filter-label {
      font-size: 0.6875rem;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-tertiary);
      margin-right: var(--sp-1);
      flex-shrink: 0;
    }

    .tag-btn {
      font-family: var(--font-ui);
      font-size: 0.75rem;
      font-weight: 500;
      color: var(--tag-text);
      background: var(--tag-bg);
      border: 1px solid transparent;
      border-radius: 100px;
      padding: 3px 12px;
      cursor: pointer;
      transition: background-color 0.1s, color 0.1s;
      white-space: nowrap;
      line-height: 1.6;
    }

    .tag-btn:hover {
      background: var(--border-focus);
      color: var(--text-primary);
    }

    .tag-btn.active {
      background: var(--tag-active-bg);
      color: var(--tag-active-text);
    }

    /* ======================================================================
       FEATURED STORY
    ====================================================================== */
    .featured-wrap {
      margin-bottom: var(--sp-6);
    }

    .section-eyebrow {
      font-size: 0.6875rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--accent-text);
      margin-bottom: var(--sp-2);
    }

    .featured-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-top: 3px solid var(--accent);
      border-radius: var(--radius);
      padding: var(--sp-6);
    }

    .featured-headline {
      font-family: var(--font-editorial);
      font-size: clamp(1.5rem, 3vw, 2.125rem);
      font-weight: 400;
      line-height: 1.3;
      margin-bottom: var(--sp-3);
    }

    .featured-headline a {
      color: var(--text-primary);
      text-decoration: none;
      transition: color 0.1s;
    }

    .featured-headline a:hover { color: var(--accent); }

    .card-meta {
      display: flex;
      align-items: center;
      gap: var(--sp-1);
      font-size: 0.75rem;
      color: var(--text-tertiary);
      margin-bottom: var(--sp-3);
    }

    .meta-source {
      font-weight: 500;
      color: var(--text-secondary);
    }

    .meta-sep {
      width: 3px;
      height: 3px;
      border-radius: 50%;
      background: var(--text-tertiary);
      flex-shrink: 0;
    }

    .featured-summary {
      font-size: 0.9375rem;
      color: var(--text-secondary);
      line-height: 1.65;
      margin-bottom: var(--sp-3);
      max-width: 72ch;
    }

    .featured-reason {
      font-size: 0.875rem;
      line-height: 1.55;
      color: var(--accent-text);
      border-left: 2px solid var(--accent);
      padding-left: var(--sp-2);
      margin-bottom: var(--sp-3);
    }

    /* ======================================================================
       TAG PILL — used on both featured and grid cards
    ====================================================================== */
    .tag-pill {
      display: inline-block;
      font-size: 0.6875rem;
      font-weight: 500;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: var(--tag-text);
      background: var(--tag-bg);
      border-radius: 100px;
      padding: 2px 10px;
    }

    /* ======================================================================
       STORY GRID & CARDS
    ====================================================================== */
    .grid-header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: var(--sp-3);
      padding-bottom: var(--sp-2);
      border-bottom: 1px solid var(--border);
    }

    .grid-label {
      font-size: 0.6875rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-tertiary);
    }

    .story-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: var(--sp-2);
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: var(--sp-3);
      display: flex;
      flex-direction: column;
      gap: var(--sp-2);
      transition: border-color 0.12s ease;
    }

    .card:hover { border-color: var(--border-focus); }

    .card-headline {
      font-family: var(--font-editorial);
      font-size: 1.0625rem;
      font-weight: 400;
      line-height: 1.4;
      flex: 1;
    }

    .card-headline a {
      color: var(--text-primary);
      text-decoration: none;
      transition: color 0.1s;
    }

    .card-headline a:hover { color: var(--accent); }

    .card-reason {
      font-size: 0.8125rem;
      line-height: 1.5;
      color: var(--text-secondary);
      border-left: 1px solid var(--accent-border);
      padding-left: var(--sp-2);
    }

    /* ======================================================================
       PENDING SECTION
    ====================================================================== */
    .pending-section {
      display: none;
      margin-top: var(--sp-12);
      padding-top: var(--sp-6);
      border-top: 1px solid var(--border);
    }

    .pending-eyebrow {
      font-size: 0.6875rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-tertiary);
      margin-bottom: var(--sp-1);
    }

    .pending-note {
      font-size: 0.8125rem;
      color: var(--text-tertiary);
      line-height: 1.55;
      margin-bottom: var(--sp-4);
    }

    .pending-note code {
      font-family: 'SFMono-Regular', Consolas, monospace;
      font-size: 0.75rem;
      background: var(--border);
      padding: 1px 5px;
      border-radius: var(--radius-sm);
    }

    .pending-tag-badge {
      display: inline-block;
      font-size: 0.625rem;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-tertiary);
      background: var(--tag-bg);
      border-radius: 100px;
      padding: 2px 8px;
    }

    .card.pending { opacity: 0.72; }

    /* ======================================================================
       EMPTY STATE
    ====================================================================== */
    .empty-state {
      grid-column: 1 / -1;
      padding: var(--sp-12) 0;
    }

    .empty-state h2 {
      font-size: 0.9375rem;
      font-weight: 500;
      color: var(--text-secondary);
      margin-bottom: var(--sp-1);
    }

    .empty-state p {
      font-size: 0.875rem;
      color: var(--text-tertiary);
      max-width: 40ch;
      line-height: 1.6;
    }

    /* ======================================================================
       SKELETON LOADER
    ====================================================================== */
    @keyframes shimmer {
      0%   { background-position: -600px 0; }
      100% { background-position:  600px 0; }
    }

    .skel-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: var(--sp-3);
    }

    .skel-featured {
      border-top: 3px solid var(--border);
      padding: var(--sp-6);
      margin-bottom: var(--sp-6);
    }

    .skel-line {
      border-radius: var(--radius-sm);
      background: linear-gradient(
        90deg,
        var(--surface)  25%,
        var(--border)   50%,
        var(--surface)  75%
      );
      background-size: 1200px 100%;
      animation: shimmer 1.5s ease-in-out infinite;
    }

    .skel-line + .skel-line { margin-top: 10px; }

    .skel-line.h-28  { height: 28px; }
    .skel-line.h-18  { height: 18px; }
    .skel-line.h-14  { height: 14px; }
    .skel-line.h-12  { height: 12px; }
    .skel-line.w-100 { width: 100%; }
    .skel-line.w-80  { width: 80%; }
    .skel-line.w-55  { width: 55%; }
    .skel-line.w-40  { width: 40%; }

    .skel-spacer-sm { height: var(--sp-2); }
    .skel-spacer-md { height: var(--sp-4); }

    /* ======================================================================
       LOAD ERROR
    ====================================================================== */
    .load-error {
      padding-top: var(--sp-12);
      font-size: 0.875rem;
      color: var(--text-tertiary);
    }

    /* ======================================================================
       FOOTER
    ====================================================================== */
    footer {
      border-top: 1px solid var(--border);
      padding: var(--sp-3) 0;
    }

    .footer-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 0.75rem;
      color: var(--text-tertiary);
    }

    /* ======================================================================
       ACCESSIBILITY
    ====================================================================== */
    :focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 3px;
      border-radius: var(--radius);
    }

    /* ======================================================================
       RESPONSIVE
    ====================================================================== */
    @media (max-width: 780px) {
      .story-grid { grid-template-columns: 1fr; }
      .featured-card { padding: var(--sp-3); }
    }

    @media (max-width: 480px) {
      :root { --sp-4: 1rem; }
      .masthead-name { letter-spacing: -0.01em; }
      .masthead-strip { grid-template-columns: 1fr; gap: 2px; text-align: left; }
      .masthead-strip-center,
      .masthead-strip-right { text-align: left; }
    }
  </style>
</head>
<body>

<!-- ── Masthead ─────────────────────────────────────────────────────────── -->
<header>
  <div class="col">
    <div class="masthead">
      <div class="masthead-body">
        <hr class="masthead-rule" />
        <h1 class="masthead-name">Better Problems</h1>
        <p class="masthead-tagline">Surfacing stories of AI genuinely helping humanity — cutting through the hype and the doom to find what's actually working.</p>
      </div>
      <div class="masthead-strip">
        <span id="pub-date"></span>
        <span class="masthead-strip-center">Daily &thinsp;·&thinsp; Editorially filtered</span>
        <span class="masthead-strip-right">
          <a href="https://github.com/mrjohnsonloomis/ai_news" target="_blank" rel="noopener noreferrer">Source</a>
        </span>
      </div>
    </div>
  </div>
</header>

<!-- ── Content ─────────────────────────────────────────────────────────── -->
<main>
  <div class="col">
    <!-- Filter bar: rendered after data loads -->
    <div id="filter-bar"></div>

    <!-- Story content: re-rendered on filter change -->
    <div id="story-content" aria-live="polite"></div>

    <!-- Pending: shown if pending array is non-empty -->
    <div id="pending-section" class="pending-section"></div>
  </div>
</main>

<!-- ── Footer ──────────────────────────────────────────────────────────── -->
<footer>
  <div class="col footer-inner">
    <span id="last-updated"></span>
    <span>Stories older than 90 days are pruned automatically.</span>
  </div>
</footer>

<script>
  // ────────────────────────────────────────────────────────────────────────
  // State
  // ────────────────────────────────────────────────────────────────────────

  let currentFilter = 'all';
  let allStories    = [];

  // Canonical tag order for the filter bar
  const TAG_ORDER = [
    'Health', 'Climate', 'Science', 'Education',
    'Accessibility', 'Humanitarian', 'Conservation', 'Other',
  ];

  // ────────────────────────────────────────────────────────────────────────
  // Utilities
  // ────────────────────────────────────────────────────────────────────────

  function esc(str) {
    return String(str ?? '')
      .replace(/&/g,  '&amp;')
      .replace(/</g,  '&lt;')
      .replace(/>/g,  '&gt;')
      .replace(/"/g,  '&quot;');
  }

  // Avoids timezone day-shift by parsing as local date
  function localDate(dateStr) {
    const [y, m, d] = (dateStr ?? '').split('-').map(Number);
    return (y && m && d) ? new Date(y, m - 1, d) : null;
  }

  function formatDateFull(dateStr) {
    const dt = localDate(dateStr);
    return dt ? dt.toLocaleDateString('en-US', {
      weekday: 'long', month: 'long', day: 'numeric', year: 'numeric',
    }) : (dateStr ?? '');
  }

  function formatDateShort(dateStr) {
    const dt = localDate(dateStr);
    return dt ? dt.toLocaleDateString('en-US', {
      month: 'long', day: 'numeric', year: 'numeric',
    }) : (dateStr ?? '');
  }

  function formatTimestamp(iso) {
    return iso ? new Date(iso).toLocaleString('en-US', {
      month: 'short', day: 'numeric', year: 'numeric',
      hour: '2-digit', minute: '2-digit', timeZoneName: 'short',
    }) : '';
  }

  function normalizeTag(tag) {
    return (tag || 'Other').trim();
  }

  function filteredStories() {
    if (currentFilter === 'all') return allStories;
    return allStories.filter(s => normalizeTag(s.tag) === currentFilter);
  }

  // ────────────────────────────────────────────────────────────────────────
  // Skeleton
  // ────────────────────────────────────────────────────────────────────────

  function skeletonHtml() {
    return `
      <div class="skel-card skel-featured" aria-hidden="true">
        <div class="skel-line h-28 w-100"></div>
        <div class="skel-line h-28 w-80"></div>
        <div class="skel-spacer-md"></div>
        <div class="skel-line h-14 w-40"></div>
        <div class="skel-spacer-md"></div>
        <div class="skel-line h-14 w-100"></div>
        <div class="skel-line h-14 w-80"></div>
        <div class="skel-line h-14 w-55"></div>
      </div>
      <div class="story-grid" aria-hidden="true">
        ${['w-100 w-80', 'w-80 w-100'].map(ws => {
          const [a, b] = ws.split(' ');
          return `
            <div class="skel-card">
              <div class="skel-line h-18 ${a}"></div>
              <div class="skel-line h-18 ${b}"></div>
              <div class="skel-spacer-sm"></div>
              <div class="skel-line h-12 w-40"></div>
              <div class="skel-spacer-sm"></div>
              <div class="skel-line h-14 w-100"></div>
            </div>`;
        }).join('')}
      </div>`;
  }

  // ────────────────────────────────────────────────────────────────────────
  // Rendering
  // ────────────────────────────────────────────────────────────────────────

  function tagPill(story) {
    const t = normalizeTag(story.tag);
    return `<span class="tag-pill">${esc(t)}</span>`;
  }

  function metaHtml(story) {
    return `
      <div class="card-meta">
        <span class="meta-source">${esc(story.source)}</span>
        <span class="meta-sep" role="presentation"></span>
        <span>${esc(formatDateShort(story.date))}</span>
      </div>`;
  }

  function featuredHtml(story) {
    return `
      <div class="featured-wrap">
        <p class="section-eyebrow">Featured</p>
        <div class="featured-card">
          <h2 class="featured-headline">
            <a href="${esc(story.url)}" target="_blank" rel="noopener noreferrer">
              ${esc(story.headline)}
            </a>
          </h2>
          ${metaHtml(story)}
          ${story.summary
            ? `<p class="featured-summary">${esc(story.summary)}</p>`
            : ''}
          <p class="featured-reason">${esc(story.reason)}</p>
          ${story.tag ? tagPill(story) : ''}
        </div>
      </div>`;
  }

  function gridCardHtml(story) {
    return `
      <article class="card">
        <h3 class="card-headline">
          <a href="${esc(story.url)}" target="_blank" rel="noopener noreferrer">
            ${esc(story.headline)}
          </a>
        </h3>
        ${metaHtml(story)}
        <p class="card-reason">${esc(story.reason)}</p>
        ${story.tag ? tagPill(story) : ''}
      </article>`;
  }

  function gridHtml(stories) {
    if (stories.length === 0) return '';
    return `
      <div class="grid-header">
        <span class="grid-label">More stories</span>
      </div>
      <div class="story-grid">
        ${stories.map(s => gridCardHtml(s)).join('\n')}
      </div>`;
  }

  function emptyStateHtml() {
    const msg = currentFilter === 'all'
      ? 'Nothing passed the bar today — the filter is strict by design. Check back tomorrow.'
      : `No ${currentFilter} stories in the feed yet.`;
    return `
      <div class="story-grid">
        <div class="empty-state">
          <h2>${currentFilter === 'all' ? 'Nothing passed the bar today' : `No ${esc(currentFilter)} stories yet`}</h2>
          <p>${esc(msg)}</p>
        </div>
      </div>`;
  }

  function storyContentHtml() {
    const stories = filteredStories();
    if (stories.length === 0) return emptyStateHtml();
    const [featured, ...rest] = stories;
    return featuredHtml(featured) + gridHtml(rest);
  }

  function filterBarHtml(stories) {
    const presentTags = [...new Set(stories.map(s => normalizeTag(s.tag)))];
    const tags = TAG_ORDER.filter(t => presentTags.includes(t));
    if (tags.length === 0) return '';
    return `
      <div class="filter-bar" role="group" aria-label="Filter stories by topic">
        <span class="filter-label">Topic</span>
        <button class="tag-btn active" data-tag="all">All</button>
        ${tags.map(t => `
          <button class="tag-btn" data-tag="${esc(t)}">${esc(t)}</button>
        `).join('')}
      </div>`;
  }

  function pendingHtml(pending) {
    const n = pending.length;
    return `
      <p class="pending-eyebrow">Pending review</p>
      <p class="pending-note">
        ${n === 1 ? 'One story' : `${n} stories`} passed with medium confidence
        and ${n === 1 ? 'is' : 'are'} awaiting manual review.
        Approve with <code>python scripts/manage.py approve &lt;id&gt;</code>.
      </p>
      <div class="story-grid">
        ${pending.map(s => `
          <article class="card pending">
            <span class="pending-tag-badge">Awaiting review</span>
            <h3 class="card-headline">
              <a href="${esc(s.url)}" target="_blank" rel="noopener noreferrer">
                ${esc(s.headline)}
              </a>
            </h3>
            ${metaHtml(s)}
            <p class="card-reason">${esc(s.reason)}</p>
          </article>`).join('\n')}
      </div>`;
  }

  // ────────────────────────────────────────────────────────────────────────
  // Filter interaction
  // ────────────────────────────────────────────────────────────────────────

  function applyFilter(tag) {
    currentFilter = tag;
    document.querySelectorAll('.tag-btn').forEach(btn => {
      btn.classList.toggle('active', btn.dataset.tag === tag);
    });
    document.getElementById('story-content').innerHTML = storyContentHtml();
  }

  // ────────────────────────────────────────────────────────────────────────
  // Init
  // ────────────────────────────────────────────────────────────────────────

  async function init() {
    const filterBarEl  = document.getElementById('filter-bar');
    const contentEl    = document.getElementById('story-content');
    const pendingEl    = document.getElementById('pending-section');
    const tsEl         = document.getElementById('last-updated');
    const pubDateEl    = document.getElementById('pub-date');

    // Today's date in the masthead strip
    pubDateEl.textContent = new Date().toLocaleDateString('en-US', {
      weekday: 'long', month: 'long', day: 'numeric', year: 'numeric',
    });

    // Show skeleton immediately
    contentEl.innerHTML = skeletonHtml();

    try {
      const resp = await fetch('data/stories.json');
      if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
      const data = await resp.json();

      allStories = data.stories ?? [];
      const pending = data.pending ?? [];

      // Render filter bar (only if tags exist in the data)
      const barHtml = filterBarHtml(allStories);
      if (barHtml) {
        filterBarEl.innerHTML = barHtml;
        // Event delegation — one listener handles all tag buttons
        filterBarEl.addEventListener('click', e => {
          const btn = e.target.closest('.tag-btn');
          if (btn) applyFilter(btn.dataset.tag);
        });
      }

      // Render stories
      contentEl.innerHTML = storyContentHtml();

      // Render pending section if needed
      if (pending.length > 0) {
        pendingEl.innerHTML = pendingHtml(pending);
        pendingEl.style.display = 'block';
      }

      // Footer timestamp
      if (data.last_updated) {
        tsEl.textContent = 'Updated ' + formatTimestamp(data.last_updated);
      }

    } catch (err) {
      contentEl.innerHTML = `
        <p class="load-error">Unable to load feed — ${esc(err.message)}</p>`;
    }
  }

  init();
</script>
</body>
</html>
